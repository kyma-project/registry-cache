apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyma-project.io--registry-cache-to-apiserver
  namespace: system
  labels:
    app.kubernetes.io/name: registry-cache
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/module: registry-cache
    purpose: apiserver
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: registry-cache
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
